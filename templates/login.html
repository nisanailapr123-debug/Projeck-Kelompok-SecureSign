{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 mt-5">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <div class="brand-icon mb-3">
                        <i class="bi bi-pen-fill text-primary" style="font-size:2.5rem"></i>
                    </div>
                    <h2 class="fw-bold">SignDoc</h2>
                    <p class="text-muted">Sistem Tanda Tangan Digital</p>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" class="form-control"
                                   placeholder="Masukkan username" required autofocus>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control"
                                   placeholder="Masukkan password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Login
                    </button>
                </form>

                <hr class="my-3">
                <p class="text-center text-muted mb-0">
                    Belum punya akun?
                    <a href="{{ url_for('auth.register') }}" class="text-decoration-none fw-semibold">
                        Daftar di sini
                    </a>
                </p>
            </div>
        </div>

        <div class="card border-0 bg-light mt-3">
            <div class="card-body p-3">
                <small class="text-muted">
                    <i class="bi bi-shield-lock me-1 text-success"></i>
                    <strong>Keamanan:</strong> Password tidak pernah disimpan dalam bentuk plaintext.
                    Private key RSA Anda dienkripsi dengan password Anda.
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
